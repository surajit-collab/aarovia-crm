<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarovia – Quotation Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0e0f11;--bg2:#141519;--bg3:#1a1c22;--border:#2a2d38;--border2:#353847;
  --text:#e8eaf0;--text2:#9096ab;--text3:#5a6175;
  --accent:#4f8ef7;--green:#34d399;--red:#f87171;--purple:#a78bfa;
  --font:'DM Sans',sans-serif;--serif:'DM Serif Display',serif;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2)}

/* Left: form */
.form-panel{width:420px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:24px;overflow-y:auto;height:100vh}
.panel-title{font-size:16px;font-weight:600;margin-bottom:4px}
.panel-sub{font-size:12px;color:var(--text3);margin-bottom:24px}

.section-head{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px;font-weight:500}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 11px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.total-display{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);border-radius:7px;padding:14px;margin:14px 0}
.total-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.total-row:last-child{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:0;padding-top:8px;border-top:1px solid rgba(79,142,247,.2)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:7px;font-size:13px;font-family:var(--font);cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;width:100%;justify-content:center;margin-bottom:8px}
.btn-primary:hover{background:#3a7ae8}
.btn-outline{border-color:var(--border2);width:100%;justify-content:center}

/* Right: preview */
.preview-panel{flex:1;overflow-y:auto;padding:32px;background:var(--bg)}
.preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.preview-header h2{font-size:14px;color:var(--text2)}
.preview-actions{display:flex;gap:8px}

/* Quotation document */
.quotation-doc{background:#fff;border-radius:12px;padding:40px;max-width:760px;margin:0 auto;color:#1a1a2e;font-family:var(--font);box-shadow:0 20px 60px rgba(0,0,0,.4)}

.q-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:24px;border-bottom:2px solid #e5e7eb;margin-bottom:28px}
.q-logo{display:flex;align-items:center;gap:12px}
.q-logo-icon{width:44px;height:44px;background:#4f8ef7;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.q-company-name{font-family:var(--serif);font-size:24px;color:#1a1a2e}
.q-company-sub{font-size:11px;color:#9ca3af;margin-top:2px}

.q-meta{text-align:right}
.q-title{font-size:22px;font-weight:700;color:#1a1a2e;letter-spacing:2px}
.q-number{font-size:13px;color:#6b7280;margin-top:4px}
.q-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.q-badge.draft{background:#fef3c7;color:#92400e}
.q-badge.sent{background:#dbeafe;color:#1e40af}
.q-badge.accepted{background:#dcfce7;color:#166534}

.q-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.q-party{background:#f9fafb;border-radius:8px;padding:14px}
.q-party-label{font-size:10px;font-weight:600;color:#9ca3af;letter-spacing:.6px;margin-bottom:8px;text-transform:uppercase}
.q-party-name{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:3px}
.q-party-sub{font-size:12px;color:#6b7280;line-height:1.5}

.q-property-highlight{background:linear-gradient(135deg,#eff6ff 0%,#f0fdf4 100%);border:1px solid #bfdbfe;border-radius:8px;padding:16px;margin-bottom:24px;display:flex;align-items:flex-start;gap:14px}
.q-prop-icon{width:44px;height:44px;background:#4f8ef7;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

.q-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.q-table thead tr{background:#f1f5f9}
.q-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid #e5e7eb}
.q-table td{padding:12px 14px;border-bottom:1px solid #f3f4f6;font-size:13px}
.q-table tr:last-child td{border-bottom:none}

.q-summary{display:grid;grid-template-columns:1fr 240px;gap:20px;margin-bottom:24px}
.q-totals{background:#f9fafb;border-radius:8px;padding:16px}
.q-total-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f3f4f6}
.q-total-row:last-child{border-bottom:none;font-size:16px;font-weight:700;color:#1a1a2e;padding-top:10px;margin-top:4px}
.q-discount{color:#059669}
.q-grand-total{background:#1a1a2e;border-radius:8px;padding:14px;text-align:center}
.q-grand-amount{font-size:24px;font-weight:700;color:#fff}
.q-grand-label{font-size:11px;color:#9ca3af;margin-top:3px}

.q-bank{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:14px;margin-bottom:20px}
.q-bank-title{font-size:11px;font-weight:600;color:#92400e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.q-bank-row{display:flex;gap:8px;font-size:12px;color:#78350f;margin-bottom:4px}
.q-bank-row span:first-child{width:100px;color:#a16207}

.q-terms{margin-bottom:20px}
.q-terms-title{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px}
.q-terms ol{padding-left:16px;font-size:12px;color:#6b7280;line-height:1.8}

.q-footer{border-top:1px solid #e5e7eb;padding-top:16px;display:flex;justify-content:space-between;align-items:flex-end}
.q-exec{font-size:12px;color:#6b7280}
.q-exec strong{display:block;color:#1a1a2e;font-size:13px;margin-bottom:2px}
.q-stamp{width:80px;height:80px;border-radius:50%;border:3px solid #4f8ef7;display:flex;align-items:center;justify-content:center;text-align:center;font-size:9px;font-weight:600;color:#4f8ef7;line-height:1.3;letter-spacing:.3px;text-transform:uppercase}

/* Watermark for draft */
.draft-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-45deg);font-size:80px;font-weight:900;color:rgba(239,68,68,.08);pointer-events:none;white-space:nowrap;letter-spacing:10px;font-family:var(--serif)}

/* Additional items table */
.add-item-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.add-item-row .form-input{margin:0}
.add-item-row .btn{padding:8px 10px;flex-shrink:0}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:999}
.toast-item{background:var(--bg3);border:1px solid var(--border2);border-left:3px solid var(--green);border-radius:7px;padding:10px 16px;font-size:13px;margin-top:8px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<script>
  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });
</script>

<!-- Form Panel -->
<div class="form-panel">
  <a href="index.html" style="font-size:12px;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:6px;margin-bottom:20px"><i class="fa-solid fa-arrow-left"></i> Back to CRM</a>
  <div class="panel-title">Quotation Generator</div>
  <div class="panel-sub">Fill in the details to generate a professional quotation</div>

  <div class="section-head">Quotation Info</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Quotation No.</label><input class="form-input" id="q-num" value="QT-0005" readonly></div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-input" id="q-status" onchange="updatePreview()">
        <option>Draft</option><option>Sent</option><option>Accepted</option><option>Rejected</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Quote Date</label><input type="date" class="form-input" id="q-date" value="2026-05-25" oninput="updatePreview()"></div>
    <div class="form-group"><label class="form-label">Valid Until</label><input type="date" class="form-input" id="q-valid" value="2026-06-25" oninput="updatePreview()"></div>
  </div>

  <div class="section-head">Customer Details</div>
  <div class="form-group"><label class="form-label">Customer Name *</label><input class="form-input" id="q-cname" value="Ramesh Kumar" oninput="updatePreview()"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Mobile</label><input class="form-input" id="q-cmobile" value="9876543210" oninput="updatePreview()"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="q-cemail" value="ramesh@gmail.com" oninput="updatePreview()"></div>
  </div>
  <div class="form-group"><label class="form-label">Address</label><input class="form-input" id="q-caddr" value="Chennai, Tamil Nadu" oninput="updatePreview()"></div>

  <div class="section-head">Property Details</div>
  <div class="form-group"><label class="form-label">Project Name *</label>
    <select class="form-input" id="q-project" onchange="updatePreview()">
      <option>Aarovia Heights</option><option>Aarovia Villas</option><option>Aarovia Plots</option><option>Aarovia Skyline</option><option>Aarovia Green Valley</option>
    </select>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Unit / Block</label><input class="form-input" id="q-unit" value="Block A, Unit 1204" oninput="updatePreview()"></div>
    <div class="form-group"><label class="form-label">Configuration</label>
      <select class="form-input" id="q-config" onchange="updatePreview()">
        <option>2BHK</option><option selected>3BHK</option><option>4BHK</option><option>Villa</option><option>Plot</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Carpet Area (sqft)</label><input type="number" class="form-input" id="q-area" value="1450" oninput="calcTotal()"></div>
    <div class="form-group"><label class="form-label">Rate per sqft (₹)</label><input type="number" class="form-input" id="q-rate" value="7500" oninput="calcTotal()"></div>
  </div>

  <div class="section-head">Additional Charges</div>
  <div id="extra-items">
    <div class="add-item-row">
      <input class="form-input" placeholder="Car Parking" value="Car Parking" oninput="calcTotal()">
      <input type="number" class="form-input" placeholder="Amount" value="500000" style="width:100px" oninput="calcTotal()">
      <button class="btn" style="color:var(--red);padding:8px" onclick="removeItem(this)"><i class="fa-solid fa-trash"></i></button>
    </div>
    <div class="add-item-row">
      <input class="form-input" placeholder="Club Membership" value="Club Membership" oninput="calcTotal()">
      <input type="number" class="form-input" placeholder="Amount" value="150000" style="width:100px" oninput="calcTotal()">
      <button class="btn" style="color:var(--red);padding:8px" onclick="removeItem(this)"><i class="fa-solid fa-trash"></i></button>
    </div>
  </div>
  <button class="btn btn-outline" style="margin-bottom:12px" onclick="addItem()"><i class="fa-solid fa-plus"></i> Add Charge</button>

  <div class="section-head">Pricing</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Discount %</label><input type="number" class="form-input" id="q-disc" value="3" min="0" max="20" oninput="calcTotal()"></div>
    <div class="form-group"><label class="form-label">GST %</label>
      <select class="form-input" id="q-gst" onchange="calcTotal()">
        <option value="5">5%</option><option value="12">12%</option><option value="18" selected>18%</option>
      </select>
    </div>
  </div>

  <div class="total-display" id="total-display"></div>

  <div class="section-head">Bank Details</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Bank Name</label><input class="form-input" id="q-bank" value="HDFC Bank" oninput="updatePreview()"></div>
    <div class="form-group"><label class="form-label">Account No.</label><input class="form-input" id="q-acc" value="50200012345678" oninput="updatePreview()"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">IFSC Code</label><input class="form-input" id="q-ifsc" value="HDFC0001234" oninput="updatePreview()"></div>
    <div class="form-group"><label class="form-label">Account Name</label><input class="form-input" id="q-aname" value="Aarovia Real Estates Pvt Ltd" oninput="updatePreview()"></div>
  </div>

  <div class="section-head">Sales Executive</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Executive Name</label>
      <select class="form-input" id="q-exec" onchange="updatePreview()">
        <option>Suresh Kumar</option><option>Ananya Priya</option><option>Manoj Jha</option><option>Lavanya V</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Mobile</label><input class="form-input" id="q-emobile" value="9876543210" oninput="updatePreview()"></div>
  </div>

  <div class="section-head">Terms & Conditions</div>
  <div class="form-group"><textarea class="form-input" id="q-terms" style="min-height:100px" oninput="updatePreview()">1. This quotation is valid for the stated validity period only.
2. Prices are subject to change without prior notice after validity.
3. GST and other government levies applicable as per norms.
4. Payment schedule as per booking agreement.
5. All dimensions and areas are approximate and subject to final measurement.
6. This quotation is not a booking confirmation.</textarea></div>

  <button class="btn btn-primary" onclick="generateQuotation()"><i class="fa-solid fa-file-invoice"></i> Generate Quotation</button>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn btn-outline" onclick="printQuotation()"><i class="fa-solid fa-print"></i> Print / PDF</button>
    <button class="btn btn-outline" onclick="shareWhatsApp()"><i class="fa-brands fa-whatsapp" style="color:var(--green)"></i> WhatsApp</button>
    <button class="btn btn-outline" onclick="showToast('Email sent!','success')"><i class="fa-solid fa-envelope"></i> Email</button>
  </div>
</div>

<!-- Preview Panel -->
<div class="preview-panel">
  <div class="preview-header">
    <h2><i class="fa-solid fa-eye"></i> Live Preview</h2>
    <div class="preview-actions">
      <button class="btn" onclick="printQuotation()" style="color:var(--text2);font-size:12px"><i class="fa-solid fa-print"></i> Print</button>
    </div>
  </div>
  <div id="quotation-preview"></div>
</div>

<div id="toast"></div>

<script>
function fmtRs(n){return '₹'+Math.round(n).toLocaleString('en-IN')}
function fmtDate(str){if(!str)return'';const d=new Date(str);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}

function getExtraItems(){
  return Array.from(document.querySelectorAll('#extra-items .add-item-row')).map(row=>{
    const inputs=row.querySelectorAll('input');
    return{name:inputs[0].value||'',amount:+inputs[1].value||0};
  }).filter(x=>x.name&&x.amount);
}

function calcTotal(){
  const area=+document.getElementById('q-area').value||0;
  const rate=+document.getElementById('q-rate').value||0;
  const disc=+document.getElementById('q-disc').value||0;
  const gst=+document.getElementById('q-gst').value||18;
  const extras=getExtraItems().reduce((a,x)=>a+x.amount,0);
  const base=area*rate+extras;
  const discAmt=base*(disc/100);
  const gstAmt=(base-discAmt)*(gst/100);
  const total=base-discAmt+gstAmt;

  document.getElementById('total-display').innerHTML=`
    <div class="total-row"><span>Base Price (${area} sqft × ₹${rate})</span><span>${fmtRs(area*rate)}</span></div>
    <div class="total-row"><span>Additional Charges</span><span>${fmtRs(extras)}</span></div>
    ${disc>0?`<div class="total-row"><span style="color:var(--green)">Discount (${disc}%)</span><span style="color:var(--green)">– ${fmtRs(discAmt)}</span></div>`:''}
    <div class="total-row"><span>GST (${gst}%)</span><span>${fmtRs(gstAmt)}</span></div>
    <div class="total-row"><strong>Total Amount</strong><strong>${fmtRs(total)}</strong></div>`;

  updatePreview();
}

function updatePreview(){
  const area=+document.getElementById('q-area').value||0;
  const rate=+document.getElementById('q-rate').value||0;
  const disc=+document.getElementById('q-disc').value||0;
  const gst=+document.getElementById('q-gst').value||18;
  const extras=getExtraItems();
  const extraTotal=extras.reduce((a,x)=>a+x.amount,0);
  const base=area*rate+extraTotal;
  const discAmt=base*(disc/100);
  const gstAmt=(base-discAmt)*(gst/100);
  const total=base-discAmt+gstAmt;
  const status=document.getElementById('q-status').value;
  const badgeClass={Draft:'draft',Sent:'sent',Accepted:'accepted',Rejected:'draft'}[status]||'draft';

  const terms=document.getElementById('q-terms').value.split('\n').filter(t=>t.trim());

  document.getElementById('quotation-preview').innerHTML=`
    <div class="quotation-doc" style="position:relative">
      ${status==='Draft'?'<div class="draft-watermark">DRAFT</div>':''}

      <div class="q-header">
        <div class="q-logo">
          <div class="q-logo-icon">🏠</div>
          <div>
            <div class="q-company-name">Aarovia</div>
            <div class="q-company-sub">Real Estates Pvt Ltd · Chennai, Tamil Nadu</div>
            <div class="q-company-sub">info@aarovia.co.in · +91 44 1234 5678 · www.aarovia.co.in</div>
          </div>
        </div>
        <div class="q-meta">
          <div class="q-title">QUOTATION</div>
          <div class="q-number">${document.getElementById('q-num').value}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px">
            Date: ${fmtDate(document.getElementById('q-date').value)}<br>
            Valid till: ${fmtDate(document.getElementById('q-valid').value)}
          </div>
          <span class="q-badge ${badgeClass}">${status}</span>
        </div>
      </div>

      <div class="q-parties">
        <div class="q-party">
          <div class="q-party-label">Bill To</div>
          <div class="q-party-name">${document.getElementById('q-cname').value||'Customer Name'}</div>
          <div class="q-party-sub">${document.getElementById('q-cmobile').value||''}<br>${document.getElementById('q-cemail').value||''}<br>${document.getElementById('q-caddr').value||''}</div>
        </div>
        <div class="q-party">
          <div class="q-party-label">From</div>
          <div class="q-party-name">Aarovia Real Estates Pvt Ltd</div>
          <div class="q-party-sub">123 Anna Salai, Chennai<br>Tamil Nadu – 600002<br>GSTIN: 33AABCA1234B1Z5</div>
        </div>
      </div>

      <div class="q-property-highlight">
        <div class="q-prop-icon">${{Apartment:'🏢',Villa:'🏡',Plot:'🌿',Commercial:'🏬'}[document.getElementById('q-project').value]||'🏠'}</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:4px">${document.getElementById('q-project').value}</div>
          <div style="font-size:13px;color:#4b5563">${document.getElementById('q-config').value} · ${document.getElementById('q-unit').value||'Unit Details'}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px">Carpet Area: ${area} sqft · Rate: ₹${rate.toLocaleString('en-IN')}/sqft</div>
        </div>
      </div>

      <table class="q-table">
        <thead><tr><th>#</th><th>Description</th><th>Area / Qty</th><th>Rate</th><th>Amount</th></tr></thead>
        <tbody>
          <tr><td style="color:#6b7280">1</td><td>${document.getElementById('q-project').value} – ${document.getElementById('q-config').value}</td><td>${area} sqft</td><td>${fmtRs(rate)}/sqft</td><td style="font-weight:500">${fmtRs(area*rate)}</td></tr>
          ${extras.map((e,i)=>`<tr><td style="color:#6b7280">${i+2}</td><td>${e.name}</td><td>1</td><td>${fmtRs(e.amount)}</td><td style="font-weight:500">${fmtRs(e.amount)}</td></tr>`).join('')}
        </tbody>
      </table>

      <div class="q-summary">
        <div></div>
        <div class="q-totals">
          <div class="q-total-row"><span>Subtotal</span><span>${fmtRs(base)}</span></div>
          ${disc>0?`<div class="q-total-row q-discount"><span>Discount (${disc}%)</span><span>– ${fmtRs(discAmt)}</span></div>`:''}
          <div class="q-total-row"><span>GST (${gst}%)</span><span>${fmtRs(gstAmt)}</span></div>
          <div class="q-total-row"><strong>Grand Total</strong><strong>${fmtRs(total)}</strong></div>
        </div>
      </div>

      <div style="background:#1a1a2e;border-radius:8px;padding:14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;color:#9ca3af;margin-bottom:2px">TOTAL PAYABLE</div><div style="font-size:28px;font-weight:700;color:#fff">${fmtRs(total)}</div></div>
        <div style="text-align:right;font-size:11px;color:#9ca3af">Inclusive of all taxes &<br>charges as mentioned above</div>
      </div>

      <div class="q-bank">
        <div class="q-bank-title">Payment Details</div>
        <div class="q-bank-row"><span>Bank Name</span><span>${document.getElementById('q-bank').value}</span></div>
        <div class="q-bank-row"><span>Account No.</span><span>${document.getElementById('q-acc').value}</span></div>
        <div class="q-bank-row"><span>IFSC Code</span><span>${document.getElementById('q-ifsc').value}</span></div>
        <div class="q-bank-row"><span>Account Name</span><span>${document.getElementById('q-aname').value}</span></div>
      </div>

      <div class="q-terms">
        <div class="q-terms-title">Terms & Conditions</div>
        <ol>${terms.map(t=>`<li>${t.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol>
      </div>

      <div class="q-footer">
        <div class="q-exec">
          <strong>${document.getElementById('q-exec').value}</strong>
          Sales Executive · ${document.getElementById('q-emobile').value}<br>
          Aarovia Real Estates Pvt Ltd
        </div>
        <div class="q-stamp">AAROVIA<br>REAL<br>ESTATES</div>
      </div>
    </div>`;
}

function addItem(){
  const div=document.createElement('div');
  div.className='add-item-row';
  div.innerHTML=`<input class="form-input" placeholder="e.g. Maintenance Deposit" oninput="calcTotal()"><input type="number" class="form-input" placeholder="Amount" style="width:100px" oninput="calcTotal()"><button class="btn" style="color:var(--red);padding:8px" onclick="removeItem(this)"><i class="fa-solid fa-trash"></i></button>`;
  document.getElementById('extra-items').appendChild(div);
}

function removeItem(btn){btn.closest('.add-item-row').remove();calcTotal()}

function generateQuotation(){showToast('Quotation generated successfully!','success')}
function printQuotation(){window.print()}
function shareWhatsApp(){
  const name=document.getElementById('q-cname').value;
  const msg=`Hi ${name}, please find your quotation from Aarovia Real Estates attached. For any queries, contact us at info@aarovia.co.in`;
  showToast('Opening WhatsApp...','success');
}

function showToast(msg,type='success'){
  const el=document.createElement('div');
  el.className='toast-item';
  el.style.borderLeftColor=type==='success'?'var(--green)':'var(--accent)';
  el.innerHTML=`<i class="fa-solid ${type==='success'?'fa-check-circle':'fa-info-circle'}" style="color:${type==='success'?'var(--green)':'var(--accent)'}"></i>${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// Init
calcTotal();
</script>
</body>
</html>
